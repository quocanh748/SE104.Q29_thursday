<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Dating App - Clean Code</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="auth-screen" class="container" style="height: auto;">
        <div id="login-form">
            <h2 style="color: #fd5068; text-align: center;">Đăng Nhập</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPass" placeholder="Mật khẩu">
            <button type="button" onclick="handleLogin()">Đăng Nhập</button>
            <div class="auth-footer">Chưa có tài khoản? <span class="text-link"
                    onclick="switchAuthView('register-step-1')">Đăng ký ngay</span></div>
        </div>

        <div id="register-step-1" class="hidden">
            <h2 style="color: #fd5068; text-align: center;">Tạo Tài Khoản</h2>
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPass" placeholder="Mật khẩu">
            <input type="text" id="regName" placeholder="Họ và tên">
            <button type="button" onclick="goToRegStep2()">Tiếp tục ➡</button>
            <div class="auth-footer"><span class="text-link" onclick="switchAuthView('login-form')">Quay lại Đăng
                    nhập</span></div>
        </div>

        <div id="register-step-2" class="hidden">
            <h2 style="color: #fd5068; text-align: center;">Hồ Sơ</h2>
            <input type="number" id="regAge" placeholder="Tuổi (VD: 20)">
            <select id="regGender">
                <option value="male">Nam</option>
                <option value="female">Nữ</option>
            </select>
            <input type="text" id="regBio" placeholder="Viết 1 câu giới thiệu...">
            <button type="button" onclick="handleRegister()" style="background: #28a745;">Hoàn Tất</button>
            <button type="button" class="btn-secondary" onclick="switchAuthView('register-step-1')">⬅ Quay lại</button>
        </div>
    </div>

    <div id="user-screen" class="container hidden">
        <div class="top-nav">
            <button type="button" id="nav-swipe" class="active" onclick="switchAppTab('swipe')">Khám Phá</button>
            <button type="button" id="nav-likes" onclick="switchAppTab('likes')">Lượt Thích</button>
            <button type="button" id="nav-matches" onclick="switchAppTab('matches')">Tin Nhắn</button>
        </div>

        <div id="tab-swipe">
            <div id="swipe-card" class="swipe-card hidden">
                <h2 id="card-name" style="margin: 0;">Tên</h2>
                <p id="card-bio" style="color: #666; font-style: italic; min-height: 40px;"></p>
                <div class="action-buttons">
                    <button type="button" class="btn-circle" style="color: #fd5068; border-color: #fd5068;"
                        onclick="handleSwipe('pass')">❌</button>
                    <button type="button" class="btn-circle" style="color: #2ecc71; border-color: #2ecc71;"
                        onclick="handleSwipe('like')">💖</button>
                </div>
            </div>
            <div id="no-more-users" style="text-align: center; color: #888; padding-top: 50px;">
                <h1>📡</h1>
                <p>Đã hết người dùng mới.</p>
            </div>
        </div>

        <div id="tab-likes" class="hidden" style="overflow-y: auto; flex-grow: 1;">
            <h3 style="text-align:center; color:#fd5068; margin-top: 0;">Ai đó đã thích bạn!</h3>
            <div id="likes-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
        </div>

        <div id="tab-matches" class="hidden" style="overflow-y: auto; flex-grow: 1;">
            <div id="match-list"></div>
        </div>

        <div id="tab-chat" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <button type="button" class="btn-secondary" style="width: auto; padding: 5px 10px; margin: 0 10px 0 0;"
                    onclick="switchAppTab('matches')">⬅ Back</button>
                <b id="chat-partner-name" style="flex-grow: 1;">Chat</b>
                <button type="button" style="background: #ff4b4b; width: auto; padding: 5px 10px; margin: 0;"
                    onclick="unmatch()">💔 Unmatch</button>
            </div>
            <div class="chat-box" id="chat-box"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Nhập tin nhắn..."
                    onkeypress="if(event.key === 'Enter') sendMessage()">
                <button type="button" style="width: 80px; margin: 0;" onclick="sendMessage()">Gửi</button>
            </div>
        </div>

        <button type="button" onclick="logout()" class="btn-secondary" style="margin-top: auto;">Đăng Xuất</button>
    </div>

    <script src="source/config.js"></script>
    <script src="source/ui.js"></script>
    <script src="source/auth.js"></script>
    <script src="source/app.js"></script>
</body>

</html>
